<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte TI Escolar</title>
    <link rel="stylesheet" href="ti.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <h1><i class="fas fa-tools"></i> Suporte TI Escolar</h1>
            <nav>
                <button id="btn-professor" class="nav-btn active">Professor</button>
                <button id="btn-adm" class="nav-btn">Área Técnica</button>
            </nav>
        </div>
    </header>
    <main class="container">
    <section id="view-professor" class="view">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Abrir Novo Chamado</h2>
            <form id="form-chamado">
                <div class="grid-form">
                    <div class="form-group">
                        <label>Seu Nome</label>
                        <input type="text" id="nome" required placeholder="Ex: Prof. Ricardo">
                    </div>
                    <div class="form-group">
                        <label>Local</label>
                        <input type="text" id="local" required placeholder="Ex: Sala 12">
                    </div>
                </div>
                <div class="form-group">
                    <label>Urgência</label>
                    <select id="urgencia" required>
                        <option value="Comum">🟢 Comum</option>
                        <option value="Importante">🟡 Importante</option>
                        <option value="Emergencia">🔴 Emergência</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea id="descricao" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-paperclip"></i> Anexo (Simulado)</label>
                    <input type="file" id="anexo" accept="image/*">
                </div>
                <button type="submit" class="btn-primary">Enviar Chamado</button>
            </form>
        </div>
    </section>

    <section id="view-adm" class="view hidden">
        <div class="dashboard">
            <div class="stat-card">
                <span id="dash-pendentes">0</span>
                <p>Pendentes</p>
            </div>
            <div class="stat-card">
                <span id="dash-hoje">0</span>
                <p>Hoje</p>
            </div>
            <div class="stat-card">
                <span id="dash-media">0</span>
                <p>Resolvidos</p>
            </div>
        </div>

        <div class="admin-controls">
            <input type="text" id="search-bar" placeholder="🔍 Buscar por local ou professor..." oninput="renderizarChamados()">
            <select id="filter-status" onchange="renderizarChamados()">
                <option value="todos">Todos os Status</option>
                <option value="Pendente">Apenas Pendentes</option>
                <option value="Resolvido">Apenas Resolvidos</option>
            </select>
        </div>
        
        <div id="lista-chamados" class="grid-chamados"></div>
    </section>
</main>
    <div id="toast" class="toast hidden"></div>
